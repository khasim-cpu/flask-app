name: Flask CI/CD

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t flask-app .

    - name: Run Container
      run: docker run -d -p 5000:5000 flask-app